version: '3.9'

# Large-scale testnet deployment (100-1000+ nodes)
# Usage: docker compose -f docker-compose.large-scale.yml up -d --scale node-agent=500

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.optimized
    image: sovereignmap/backend:latest
    container_name: sovereignmap-backend-scale
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - NODE_ID=0
      - NUM_NODES=${NUM_NODES:-1000}
      - NUM_ROUNDS=${NUM_ROUNDS:-100}
      - FLASK_PORT=8000
      - DATABASE_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-CHANGE_ME_SCALE}@mongo:27017/sovereignmap?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS}@redis:6379/0
      - WORKERS=4
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sovereignmap-scale
    volumes:
      - backend_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  mongo:
    image: mongo:7.0
    container_name: sovereignmap-mongo-scale
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-CHANGE_ME_SCALE}
      MONGO_INITDB_DATABASE: sovereignmap
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sovereignmap-scale
    volumes:
      - mongo_data:/data/db
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    command: >
      --replSet rs0
      --auth
      --wiredTigerCacheSizeGB=1

  redis:
    image: redis:7-alpine
    container_name: sovereignmap-redis-scale
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap-scale
    volumes:
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-CHANGE_ME_REDIS} --maxmemory 2gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Scalable Node Agents (use --scale to increase)
  node-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereignmap/node-agent:latest
    environment:
      - FL_SERVER_MODE=false
      - NODE_AGENT_MODE=true
      - BACKEND_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
      - NODE_PEER_ID={{NODE_ID}}
    depends_on:
      backend:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 30s
    networks:
      - sovereignmap-scale
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Prometheus: High-capacity metrics collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sovereignmap-prometheus-scale
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.max-block-duration=6h'
      - '--query.max-concurrency=10'
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap-scale
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Grafana: Visualization with performance optimizations
  grafana:
    image: grafana/grafana:10.2
    container_name: sovereignmap-grafana-scale
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME_GRAFANA}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PANELS_PLUGIN_SUPPORT=enable
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap-scale
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Alertmanager: Alert handling for large-scale
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sovereignmap-alertmanager-scale
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap-scale
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  sovereignmap-scale:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
    ipam:
      config:
        - subnet: 172.29.0.0/16

volumes:
  mongo_data:
  redis_data:
  backend_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
