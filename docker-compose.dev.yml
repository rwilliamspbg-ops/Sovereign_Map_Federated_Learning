services:
  # Backend: Federated Learning Aggregator + Flask Metrics API (with hot reload)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereignmap/backend:dev
    container_name: sovereignmap-backend-dev
    ports:
      - "${BACKEND_API_HOST_PORT:-8000}:8000"
      - "${BACKEND_GRPC_HOST_PORT:-8080}:8080"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_DEBUG=${FLASK_DEBUG:-1}
      - NODE_ID=0
      - NUM_NODES=${NUM_NODES:-5}
      - NUM_ROUNDS=${NUM_ROUNDS:-100000}
      - FLASK_PORT=8000
      - DATABASE_URI=mongodb://${MONGO_USER:-dev}:${MONGO_PASSWORD:-dev_only_not_for_production}@mongo:27017/sovereignmap
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      # Bind mount source code for hot reload during development
      - ./src:/app/src
      - ./sovereignmap_production_backend_v2.py:/app/sovereignmap_production_backend_v2.py
      - backend_data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Frontend: React Development Server (with hot reload)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.optimized
    image: sovereignmap/frontend:dev
    container_name: sovereignmap-frontend-dev
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      # Mount source for development
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # MongoDB: Primary Data Store
  mongo:
    image: mongo:7.0
    container_name: sovereignmap-mongo-dev
    ports:
      - "127.0.0.1:${MONGO_HOST_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-dev}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-dev_only_not_for_production}
      MONGO_INITDB_DATABASE: sovereignmap
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      - mongo_data:/data/db
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Redis: Caching & Session Store
  redis:
    image: redis:7-alpine
    container_name: sovereignmap-redis-dev
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Node Agent (scalable in development)
  node-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereignmap/node-agent:dev
    environment:
      - NODE_AGENT_MODE=true
      - BACKEND_URL=http://backend:8000
      - NODE_PEER_ID=dev_node_1
      - NODE_ID=${NODE_ID:-1}
      - NPU_ENABLED=${NPU_ENABLED:-true}
      - XPU_ENABLED=${XPU_ENABLED:-true}
      - GPU_ENABLED=${GPU_ENABLED:-true}
      - FORCE_CPU=${NODE_AGENT_FORCE_CPU:-false}
      - ENABLE_DP=false
      - MAX_SAMPLES_PER_NODE=64
      - ASCEND_RT_VISIBLE_DEVICES=${ASCEND_RT_VISIBLE_DEVICES:-0}
      - ASCEND_DEVICE_ID=${ASCEND_DEVICE_ID:-0}
    command: ["python", "-u", "src/client.py", "--node-id", "${NODE_ID:-1}", "--aggregator", "backend:8080"]
    depends_on:
      - backend
      - mongo
    restart: unless-stopped
    networks:
      - sovereignmap
    devices:
      - "${ASCEND_DAVINCI0_DEVICE:-/dev/null}:/dev/davinci0"
      - "${ASCEND_DAVINCI_MGR_DEVICE:-/dev/null}:/dev/davinci_manager"
    volumes:
      - ./src:/app/src
      - tpm_certs:/etc/sovereign/certs
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Prometheus: Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sovereignmap-prometheus-dev
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped
    networks:
      - sovereignmap
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # TPM Metrics Exporter: Certificate and trust telemetry
  tpm-metrics:
    image: python:3.11-slim
    container_name: sovereignmap-tpm-metrics-dev
    volumes:
      - ./tpm_metrics_exporter.py:/app/tpm_metrics_exporter.py:ro
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py:ro
      - tpm_certs:/etc/sovereign/certs
    working_dir: /app
    command: ["sh", "-c", "python -m pip install prometheus-client flask cryptography && python tpm_metrics_exporter.py"]
    ports:
      - "${TPM_METRICS_HOST_PORT:-9091}:9091"
    networks:
      - sovereignmap
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Grafana: Visualization & Dashboards
  grafana:
    image: grafana/grafana:10.2.3
    container_name: sovereignmap-grafana-dev
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-dev_only_not_for_production}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/fl_tokenomics.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - sovereignmap
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  sovereignmap:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  backend_data:
  prometheus_data:
  grafana_data:
  tpm_certs:
