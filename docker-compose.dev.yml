version: '3.9'

services:
  # Backend: Federated Learning Aggregator + Flask Metrics API (with hot reload)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.optimized
    image: sovereignmap/backend:dev
    container_name: sovereignmap-backend-dev
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - NODE_ID=0
      - NUM_NODES=${NUM_NODES:-5}
      - NUM_ROUNDS=${NUM_ROUNDS:-100}
      - FLASK_PORT=8000
      - DATABASE_URI=mongodb://mongo:27017/sovereignmap
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      # Bind mount source code for hot reload during development
      - ./src:/app/src
      - ./sovereignmap_production_backend_v2.py:/app/sovereignmap_production_backend_v2.py
      - ./fl_metrics_translator.py:/app/fl_metrics_translator.py
      - ./spatial_threat_analyzer.py:/app/spatial_threat_analyzer.py
      - backend_data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Frontend: React Development Server (with hot reload)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.optimized
    image: sovereignmap/frontend:dev
    container_name: sovereignmap-frontend-dev
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      # Mount source for development
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # MongoDB: Primary Data Store
  mongo:
    image: mongo:7.0-alpine
    container_name: sovereignmap-mongo-dev
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: dev
      MONGO_INITDB_DATABASE: sovereignmap
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      - mongo_data:/data/db
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Redis: Caching & Session Store
  redis:
    image: redis:7-alpine
    container_name: sovereignmap-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Node Agent (single instance for development)
  node-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereignmap/node-agent:dev
    container_name: sovereignmap-node-agent-dev
    environment:
      - NODE_AGENT_MODE=true
      - BACKEND_URL=http://backend:8000
      - NODE_PEER_ID=dev_node_1
    depends_on:
      - backend
      - mongo
    restart: unless-stopped
    networks:
      - sovereignmap
    volumes:
      - ./src:/app/src
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Prometheus: Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.0-alpine
    container_name: sovereignmap-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped
    networks:
      - sovereignmap
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Grafana: Visualization & Dashboards
  grafana:
    image: grafana/grafana:10.2-alpine
    container_name: sovereignmap-grafana-dev
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=dev
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - sovereignmap
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  sovereignmap:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  backend_data:
  prometheus_data:
  grafana_data:
