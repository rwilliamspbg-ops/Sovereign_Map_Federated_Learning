services:
  backend:
    image: sovereignmap/backend:latest
    gpus: all

  node-agent-1:
    image: sovereignmap/node-agent:latest
    gpus: all

  node-agent-2:
    image: sovereignmap/node-agent:latest
    gpus: all

  node-agent-3:
    image: sovereignmap/node-agent:latest
    gpus: all

  auto-tuner:
    image: python:3.11-slim
    volumes:
      - ./hardware_auto_tuner.py:/app/hardware_auto_tuner.py:ro
    working_dir: /app
    command: ["python", "hardware_auto_tuner.py"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
