services:
  aggregator:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aggregator-ci
    environment:
      - QUORUM_THRESHOLD=2
      - BYZANTINE_RATIO=0.0
    ports:
      - "5000:5000"

  node-1:
    build: .
    environment:
      - AGGREGATOR_URL=http://aggregator:5000
    depends_on:
      - aggregator

  node-2:
    build: .
    environment:
      - AGGREGATOR_URL=http://aggregator:5000
    depends_on:
      - aggregator

  node-3:
    build: .
    environment:
      - AGGREGATOR_URL=http://aggregator:5000
    depends_on:
      - aggregator

  auto-tuner:
    image: python:3.11-slim
    volumes:
      - ./hardware_auto_tuner.py:/app/hardware_auto_tuner.py:ro
    working_dir: /app
    command: ["python", "hardware_auto_tuner.py"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
