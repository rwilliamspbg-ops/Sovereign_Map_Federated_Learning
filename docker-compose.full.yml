services:
  # ========================================================================
  # SOVEREIGN MAPS BACKEND (Flower Aggregator + Flask Metrics)
  # ========================================================================
  
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-backend
    environment:
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - FLOWER_SERVER_PORT=8080
      - FLASK_PORT=8000
      - NUM_ROUNDS=${NUM_ROUNDS:-100}
      - MIN_FIT_CLIENTS=${MIN_FIT_CLIENTS:-1}
      - MIN_AVAILABLE_CLIENTS=${MIN_AVAILABLE_CLIENTS:-1}
      - ROUND_TIMEOUT_SECONDS=${ROUND_TIMEOUT_SECONDS:-600}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"  # Flask metrics API
      - "8080:8080"  # Flower aggregator
    volumes:
      - ./sovereignmap_production_backend_v2.py:/app/sovereignmap_production_backend_v2.py:ro
      - ./src:/app/src:ro
    networks:
      - sovereign-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "description=Sovereign Maps Backend with Flower aggregator"

  # ========================================================================
  # FEDERATED LEARNING NODES (Flower Clients)
  # ========================================================================
  
  node-agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - ENABLE_DP=${ENABLE_DP:-false}
      - LOCAL_EPOCHS=${LOCAL_EPOCHS:-1}
      - BATCH_SIZE=${BATCH_SIZE:-16}
      - MAX_SAMPLES_PER_NODE=${MAX_SAMPLES_PER_NODE:-120}
      - NODE_ID=${NODE_ID:-1}
      - AGGREGATOR_HOST=backend
      - AGGREGATOR_PORT=8080
      - BYZANTINE=${BYZANTINE:-false}
    command: >
      python -u src/client.py
      --node-id ${NODE_ID:-1}
      --aggregator backend:8080
    volumes:
      - ./src:/app/src:ro
      - ./requirements.txt:/app/requirements.txt:ro
    working_dir: /app
    networks:
      - sovereign-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "description=Sovereign Maps Federated Learning Node"

  node-agent-byzantine:
    profiles:
      - byzantine
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NODE_ID=${NODE_ID:-1}
      - AGGREGATOR_HOST=backend
      - AGGREGATOR_PORT=8080
      - BYZANTINE=1
    command: >
      python -u src/client.py
      --node-id ${NODE_ID:-1}
      --aggregator backend:8080
      --byzantine
    volumes:
      - ./src:/app/src:ro
      - ./requirements.txt:/app/requirements.txt:ro
    working_dir: /app
    networks:
      - sovereign-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "description=Sovereign Maps Byzantine Federated Learning Node"

  # ========================================================================
  # MONITORING STACK
  # ========================================================================
  
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sovereign-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./tpm_alerts.yml:/etc/prometheus/tpm_alerts.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - sovereign-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.2.3
    container_name: sovereign-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME_GRAFANA}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./packages/core/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - sovereign-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sovereign-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - alertmanager-data:/alertmanager
      - ./alertmanager.yml:/etc/alertmanager/config.yml:ro
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - sovereign-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ========================================================================
# VOLUMES
# ========================================================================

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

# ========================================================================
# NETWORKS
# ========================================================================

networks:
  sovereign-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-sovereign
