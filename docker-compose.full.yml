services:
  # Backend aggregator
  backend:
    image: python:3.11-slim
    container_name: sovereign-backend
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - PROMETHEUS_PORT=8000
    volumes:
      - ./sovereignmap_production_backend_v2.py:/app/sovereignmap_production_backend_v2.py
    working_dir: /app
    command: python -m pip install flask prometheus-client && python sovereignmap_production_backend_v2.py
    networks:
      - sovereign-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Node agents (scalable)
  node-agent:
    image: python:3.11-slim
    environment:
      - NODE_ID=${NODE_ID:-1}
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    working_dir: /app
    command: python -m pip install -r requirements.txt && python src/client.py --aggregator backend:8000
    networks:
      - sovereign-network
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus metrics database
  prometheus:
    image: prom/prometheus:latest
    container_name: sovereign-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - sovereign-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: sovereign-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - sovereign-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: sovereign-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - alertmanager-data:/alertmanager
    command:
      - '--storage.path=/alertmanager'
    networks:
      - sovereign-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

networks:
  sovereign-network:
    driver: bridge
