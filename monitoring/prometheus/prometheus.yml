# Prometheus configuration for Sovereign Map Federated Learning
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sovereign-map-fl'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node agent metrics
  - job_name: 'node-agent'
    static_configs:
      - targets: ['node-agent:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Backend API metrics (Flask)
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Optional tokenomics metrics exporter
  - job_name: 'tokenomics-metrics'
    static_configs:
      - targets: ['tokenomics-metrics:9105']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Optional TPM trust metrics exporter
  - job_name: 'tpm-metrics'
    static_configs:
      - targets: ['tpm-metrics:9091']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Optional FL performance exporter
  - job_name: 'fl-performance-metrics'
    static_configs:
      - targets: ['fl-performance:8001']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # MongoDB exporter (optional)
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']
    scrape_interval: 30s

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # Docker container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # Generic metrics-exporter endpoint (optional)
  - job_name: 'metrics-exporter'
    static_configs:
      - targets: ['metrics-exporter:9108']
    metrics_path: '/metrics'
    scrape_interval: 15s
