# Prometheus configuration for Sovereign Map monitoring
# BFT + TPM Trust + Federated Learning Metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sovereign-map'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rule files
rule_files:
  - 'bft_rules.yml'
  - 'tpm_alerts.yml'

# Scrape configs
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # Federated Learning Backend
  - job_name: 'fl_backend'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 10s
    metrics_path: '/metrics'

  # TPM Trust & Verification Metrics
  - job_name: 'tpm_metrics'
    static_configs:
      - targets: ['tpm-metrics:9091']
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'tpm-exporter'

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Loki (if enabled)
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
