services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: frontend:latest
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: backend:latest
    ports:
      - "${BACKEND_API_HOST_PORT:-8081}:5000"
    environment:
      - DATABASE_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-CHANGE_ME_MONGO}@mongo:27017/mydb?authSource=admin
    depends_on:
      - mongo
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health').read()"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  mongo:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-CHANGE_ME_MONGO}
    volumes:
      - mongo_data:/data/db
    command: ["--auth"]
    restart: always

  monitoring:
    build:
      context: .
      dockerfile: Dockerfile.monitoring
    image: monitoring:latest
    ports:
      - "9090:9090"
    depends_on:
      - backend
    restart: always

  federated-learning:
    build: .
    image: federated-learning:latest
    depends_on:
      backend:
        condition: service_healthy
      mongo:
        condition: service_started
    volumes:
      - ./documentation/FL_CONFIG.md:/app/config/privacy_policy.md:ro
      - ./scripts:/app/scripts:ro
    environment:
      - FL_SERVER_MODE=true
      - FL_MODEL_PATH=/models
    entrypoint: >
      sh -c "python3 /app/scripts/validate_audit.py && python3 /app/sovereignmap_production_backend.py"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  node-agent:
    build: .
    image: federated-learning:latest
    depends_on:
      backend:
        condition: service_healthy
      mongo:
        condition: service_started
    environment:
      - NODE_AGENT_MODE=true
      - NODE_PEER_ID=node_agent
      - BACKEND_URL=http://backend:5000
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
