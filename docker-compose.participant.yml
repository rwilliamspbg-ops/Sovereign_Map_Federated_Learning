services:
  participant-node-agent:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    environment:
      - PYTHONUNBUFFERED=1
      - ENABLE_DP=${ENABLE_DP:-false}
      - LOCAL_EPOCHS=${LOCAL_EPOCHS:-1}
      - BATCH_SIZE=${BATCH_SIZE:-16}
      - MAX_SAMPLES_PER_NODE=${MAX_SAMPLES_PER_NODE:-120}
      - LLM_ADAPTER_MODEL_FAMILY=${LLM_ADAPTER_MODEL_FAMILY:-llama-3.1}
      - LLM_ADAPTER_MODEL_VERSION=${LLM_ADAPTER_MODEL_VERSION:-8b-instruct}
      - LLM_ADAPTER_TOKENIZER_HASH=${LLM_ADAPTER_TOKENIZER_HASH:-local-dev-tokenizer-v1}
      - LLM_ADAPTER_RANK=${LLM_ADAPTER_RANK:-16}
      - LLM_ADAPTER_TARGET_MODULES=${LLM_ADAPTER_TARGET_MODULES:-q_proj,v_proj}
    command: >
      python -u src/client.py
      --node-id ${NODE_ID:-1}
      --aggregator ${AGGREGATOR_HOST:-backend}:${AGGREGATOR_PORT:-8080}
    volumes:
      - ./src:/app/src:ro
      - ${PARTICIPANT_CERT_DIR:-./participants/local-participant/certs}:/app/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sovereign-network
    restart: unless-stopped


  auto-tuner:
    image: python:3.11-slim
    volumes:
      - ./hardware_auto_tuner.py:/app/hardware_auto_tuner.py:ro
    working_dir: /app
    command: ["python", "hardware_auto_tuner.py"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
networks:
  sovereign-network:
    external: true
    name: sovereign-network
