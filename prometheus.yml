global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sovereign-map'
    environment: 'testnet'

rule_files:
  - 'tpm_alerts.yml'
  - 'dashboard_compat_rules.yml'
  - 'fl_slo_alerts.yml'
  - 'fl_detailed_alerts.yml'
  - 'marketplace_alerts.yml'
  - 'av_ingestion_alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'sovereign-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'tpm-metrics'
    static_configs:
      - targets: ['tpm-metrics:9091']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'tokenomics-metrics'
    static_configs:
      - targets: ['tokenomics-metrics:9105']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'fl-performance-metrics'
    static_configs:
      - targets: ['fl-performance:8001']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
