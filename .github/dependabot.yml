version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions-updates:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-root-updates:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-core-updates:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/privacy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-privacy-updates:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    # Keep Dependabot focused on production Python manifests; archived/example
    # manifests can contain legacy constraints that break updater runs.
    exclude-paths:
      - "docs/**"
      - "examples/**"
      - "packages/training/**"
    groups:
      pip-root-updates:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      gomod-updates:
        patterns:
          - "*"
