name: "Sovereign Map CodeQL Config"

# Keep analysis focused on production paths while avoiding generated/archive data.
paths-ignore:
  - archive/**
  - legacy/**
  - test-data/**
  - test-results/**
  - results/**
  - audit_results/**

# Additional query packs can be enabled here later if needed.
# queries:
