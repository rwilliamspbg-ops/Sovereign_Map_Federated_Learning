name: Observability CI

on:
  workflow_dispatch:
  release:
    types: [published, prereleased]
  schedule:
    # Periodic drift guard for dashboards, queries, and alert semantics.
    - cron: "17 */6 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dashboard-query-validation:
    name: Validate Dashboard Queries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Validate Grafana queries
        run: python scripts/check_dashboard_queries.py

      - name: Validate compose service references in scripts
        run: python scripts/check_compose_service_references.py

  operations-live-query-smoke:
    name: Operations Live Query Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Start observability stack subset
        run: |
          docker compose -f docker-compose.full.yml up -d backend prometheus tpm-metrics tokenomics-metrics fl-performance
          sleep 20

      - name: Validate lower-half operations dashboard queries against live Prometheus
        run: python scripts/check_operations_overview_live_queries.py

      - name: Stop observability stack subset
        if: always()
        run: docker compose -f docker-compose.full.yml down --remove-orphans

  alert-rules-validation:
    name: Validate Alert Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate rule syntax with promtool
        run: |
          docker run --rm --entrypoint /bin/promtool -v "$PWD:/workspace" -w /workspace prom/prometheus:v2.48.0 \
            check rules fl_slo_alerts.yml fl_detailed_alerts.yml tpm_alerts.yml

      - name: Run alert unit tests
        run: |
          docker run --rm --entrypoint /bin/promtool -v "$PWD:/workspace" -w /workspace prom/prometheus:v2.48.0 \
            test rules fl_slo_alerts.test.yml fl_detailed_alerts.test.yml tpm_alerts.test.yml

      - name: Validate Alertmanager routing and inhibition semantics
        run: go test ./internal/monitoring -run "TestAlertmanagerRoutingPolicy|TestAlertmanagerInhibitionPolicy"
