name: Python Security Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit Scan
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run Bandit on high-risk Python surfaces
        run: |
          bandit -q \
            sovereignmap_production_backend_v2.py \
            client/python-sdk/sovereign_sdk \
            packages/training \
            tests/scripts/python \
            docs/archive/legacy/code/run_sovereign_test.py