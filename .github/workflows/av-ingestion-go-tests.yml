name: AV Ingestion Go Tests

"on":
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'sensors/mobile/**'
      - 'sensors/drone/**'
      - '.github/workflows/av-ingestion-go-tests.yml'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ main ]
    paths:
      - 'sensors/mobile/**'
      - 'sensors/drone/**'
      - '.github/workflows/av-ingestion-go-tests.yml'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  av-ingestion-tests:
    name: AV Ingestion Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: true

      - name: Run mobile and drone ingestion tests
        run: |
          bash scripts/go-with-aligned-toolchain.sh test -v ./sensors/mobile ./sensors/drone
