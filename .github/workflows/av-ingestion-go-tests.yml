name: AV Ingestion Go Tests

"on":
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'sensors/mobile/**'
      - 'sensors/drone/**'
      - '.github/workflows/av-ingestion-go-tests.yml'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ main ]
    paths:
      - 'sensors/mobile/**'
      - 'sensors/drone/**'
      - '.github/workflows/av-ingestion-go-tests.yml'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  av-ingestion-tests:
    name: AV Ingestion Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Run mobile and drone ingestion tests
        run: |
          bash scripts/go-with-aligned-toolchain.sh test -v ./sensors/mobile ./sensors/drone
