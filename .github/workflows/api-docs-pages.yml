name: API Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/api/**"
      - ".github/workflows/api-docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Pages availability
        id: pages_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          http_code=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "${http_code}" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages API is available."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for this repository; skipping deploy steps."
          fi

      - name: Configure Pages
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Prepare API docs artifact
        if: steps.pages_check.outputs.enabled == 'true'
        run: |
          rm -rf .pages-api-docs
          mkdir -p .pages-api-docs
          cp -R docs/api/. .pages-api-docs/
          cat > .pages-api-docs/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./swagger-ui.html" />
              <title>Sovereign Map API Docs</title>
            </head>
            <body>
              <p>Redirecting to API docs...</p>
              <p><a href="./swagger-ui.html">Open Swagger UI</a></p>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: .pages-api-docs

      - name: Deploy to GitHub Pages
        if: steps.pages_check.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Skip deploy when Pages is disabled
        if: steps.pages_check.outputs.enabled != 'true'
        run: echo "API docs deploy skipped because GitHub Pages is not enabled for this repository."
