name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Mondays

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'javascript-typescript', 'python' ]
        # Explicitly exclude java-kotlin since mobile-apps is incomplete
        # and lacks proper Gradle configuration
        # TODO: Add 'java-kotlin' when mobile app build is configured
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Initialize CodeQL
      uses: github/codeql-action/init@3b054500189c7b3ca9be7cd4f035ca58c00776cd
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml
        queries: security-extended,security-and-quality
        
    - name: Setup Go
      if: matrix.language == 'go'
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
      with:
        go-version: '1.23'
        
    - name: Setup Node.js
      if: matrix.language == 'javascript-typescript'
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'
        
    - name: Setup Python
      if: matrix.language == 'python'
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.12'

    # Autobuild for Go, JavaScript, Python
    - name: Autobuild
      uses: github/codeql-action/autobuild@3b054500189c7b3ca9be7cd4f035ca58c00776cd

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@3b054500189c7b3ca9be7cd4f035ca58c00776cd
      with:
        category: "/language:${{matrix.language}}"
