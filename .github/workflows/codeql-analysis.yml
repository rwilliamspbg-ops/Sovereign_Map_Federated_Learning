name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Mondays

permissions:
  actions: read
  contents: read
  security-events: write

env:
  NODE_VERSION: '22'
  NPM_VERSION: '10.9.2'

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'javascript-typescript', 'python' ]
        # Explicitly exclude java-kotlin since mobile-apps is incomplete
        # and lacks proper Gradle configuration
        # TODO: Add 'java-kotlin' when mobile app build is configured
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Initialize CodeQL
      uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml
        queries: security-extended,security-and-quality
        
    - name: Setup Go
      if: matrix.language == 'go'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        
    - name: Setup Node.js
      if: matrix.language == 'javascript-typescript'
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: '22'
        
    - name: Pin npm version
      if: matrix.language == 'javascript-typescript'
      run: |
        npm install -g npm@${NPM_VERSION}
        echo "Node: $(node -v)"
        echo "npm: $(npm -v)"
        
    - name: Setup Python
      if: matrix.language == 'python'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: '3.12'

    # Autobuild for Go, JavaScript, Python
    - name: Autobuild
      uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13
      with:
        category: "/language:${{matrix.language}}"

    # Preserve SARIF outputs as build artifacts so security findings are still
    # reviewable even when code-scanning API access is limited.
    - name: Upload CodeQL SARIF results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: codeql-sarif-${{ matrix.language }}
        path: results/*.sarif
        if-no-files-found: ignore
