name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '22'
  NPM_VERSION: '10.9.2'

jobs:
  build:
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/core/package-lock.json
            packages/privacy/package-lock.json
            frontend/package-lock.json

      - name: Pin npm version
        run: |
          npm install -g npm@${NPM_VERSION}
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"

      - name: Install root and package dependencies
        run: bash scripts/npm-ci-safe.sh

      - name: Build SDK packages
        run: npm run build:libs

      - name: Install frontend dependencies
        run: bash scripts/npm-ci-safe.sh frontend

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Capability contract tests
        run: go test ./internal/api -run TestCapabilitiesContractV1 -count=1

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.full.yml build --no-cache

      - name: Start services
        run: docker compose -f docker-compose.full.yml up -d --scale node-agent=5

      - name: Wait for backend and proxy health
        run: |
          set -euo pipefail
          echo "Waiting for backend container health and frontend proxy readiness..."

          # Wait for backend container to report healthy.
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' sovereign-backend 2>/dev/null || true)
            if [ "$status" = "healthy" ]; then
              echo "backend health check passed"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "backend did not become healthy"
              docker compose -f docker-compose.full.yml logs backend || true
              exit 1
            fi
            echo "backend health: ${status:-unknown} (attempt $i/30)"
            sleep 5
          done

          # Validate direct backend endpoint and frontend reverse-proxy endpoint.
          curl -fsS --retry 10 --retry-all-errors --retry-delay 3 \
            http://127.0.0.1:8000/ops/health >/dev/null
          curl -fsS --retry 10 --retry-all-errors --retry-delay 3 \
            http://127.0.0.1:3000/backend/ops/health >/dev/null

      - name: Debug on failure
        if: failure()
        run: |
          docker compose -f docker-compose.full.yml logs
          docker ps -a

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run Consensus Verification
        run: python3 verify_consensus.py
