name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.1.0 --activate

      - name: Install dependencies
        run: yarn install
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false

      - name: Build frontend packages
        run: yarn workspaces foreach -A --exclude "@sovereignmap/frontend" run build

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version-file: go.mod

      - name: Capability contract tests
        run: go test ./internal/api -run TestCapabilitiesContractV1 -count=1

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.200nodes.yml build --no-cache

      - name: Start services
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for backend health
        run: |
          echo "Waiting for federated learning nodes to initialize..."
          sleep 45

      - name: Debug on failure
        if: failure()
        run: |
          docker compose -f docker-compose.200nodes.yml logs
          docker ps -a

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib  # Add any other libs you need

      - name: Run Consensus Verification
        run: python3 verify_consensus.py
