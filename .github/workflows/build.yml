name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/core/package-lock.json
            packages/privacy/package-lock.json
            frontend/package-lock.json

      - name: Install root and package dependencies
        run: npm ci

      - name: Build SDK packages
        run: npm run build:libs

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod

      - name: Capability contract tests
        run: go test ./internal/api -run TestCapabilitiesContractV1 -count=1

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.full.yml build --no-cache

      - name: Start services
        run: docker compose -f docker-compose.full.yml up -d --scale node-agent=5

      - name: Wait for backend health
        run: |
          echo "Waiting for federated learning nodes to initialize..."
          sleep 45

      - name: Debug on failure
        if: failure()
        run: |
          docker compose -f docker-compose.full.yml logs
          docker ps -a

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Consensus Verification
        run: python3 verify_consensus.py
