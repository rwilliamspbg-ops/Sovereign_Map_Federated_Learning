name: Security Supply Chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sbom-and-image-scan:
    name: SBOM and Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build backend image
        run: docker build -f Dockerfile.backend.optimized -t sovereign-backend:ci .

      - name: Generate SBOM (CycloneDX)
        id: sbom
        continue-on-error: true
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: sovereign-backend:ci
          format: cyclonedx-json
          output-file: sbom-backend.cdx.json
          syft-version: v1.42.3

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: sovereign-backend:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@a899987af240c0578ed84ce13c02319a693e168f
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SBOM artifact
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-backend-cdx
          path: sbom-backend.cdx.json
