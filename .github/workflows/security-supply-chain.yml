name: Security Supply Chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sbom-and-image-scan:
    name: SBOM and Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build backend image
        run: docker build -f Dockerfile.backend.optimized -t sovereign-backend:ci .

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d
        with:
          image: sovereign-backend:ci
          format: cyclonedx-json
          output-file: sbom-backend.cdx.json

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: sovereign-backend:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@fd1ca02d0ddf5bf468c79e6ffb6ffb24f0ecba37
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: sbom-backend-cdx
          path: sbom-backend.cdx.json
