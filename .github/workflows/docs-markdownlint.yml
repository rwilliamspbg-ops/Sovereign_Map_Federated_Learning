name: docs-markdownlint

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - ".github/workflows/docs-markdownlint.yml"
      - "CONTRIBUTING.md"
      - "Documentation/**"
      - ".markdownlint-docs.json"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - ".github/workflows/docs-markdownlint.yml"
      - "CONTRIBUTING.md"
      - "Documentation/**"
      - ".markdownlint-docs.json"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Run markdownlint (targeted docs)
        run: |
          npx --yes markdownlint-cli2 \
            --config .markdownlint-docs.json \
            README.md \
            CONTRIBUTING.md \
            docs/ALERT_RUNBOOKS.md \
            docs/index.md \
            docs/README.md \
            Documentation/README.md \
            docs/DOCUMENTATION_MAINTENANCE.md \
            Documentation/Project/REPO_SETTINGS_ADMIN_RUNBOOK.md
