name: Docs Quality

on:
  pull_request:
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "Documentation/**"
      - ".markdownlint-docs.json"
      - "scripts/check_markdown_links_subset.py"
      - ".github/workflows/docs-quality.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "Documentation/**"
      - ".markdownlint-docs.json"
      - "scripts/check_markdown_links_subset.py"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-lint-and-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Markdown lint (targeted files)
        run: |
          npx --yes markdownlint-cli2 \
            --config .markdownlint-docs.json \
            README.md \
            CONTRIBUTING.md \
            docs/README.md \
            Documentation/README.md \
            docs/DOCUMENTATION_MAINTENANCE.md \
            docs/index.md \
            Documentation/Project/REPO_SETTINGS_ADMIN_RUNBOOK.md

      - name: Local markdown link check (targeted files)
        run: |
          python scripts/check_markdown_links_subset.py \
            README.md \
            CONTRIBUTING.md \
            docs/README.md \
            Documentation/README.md \
            docs/DOCUMENTATION_MAINTENANCE.md \
            docs/index.md \
            Documentation/Project/REPO_SETTINGS_ADMIN_RUNBOOK.md
