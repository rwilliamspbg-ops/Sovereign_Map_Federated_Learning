name: Full Validation PR Gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation-gate:
    name: Fast Validation Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Build backend in FIPS-required mode
        run: |
          mkdir -p bin
          CGO_ENABLED=1 GOFIPS140=latest go build -tags=requirefips -ldflags "-X main.fipsMode=required -X main.buildProfile=prod" -o bin/sovereign_backend ./cmd/sovereign-node

      - name: Verify backend build metadata
        run: |
          mkdir -p test-results/full-validation
          go version -m bin/sovereign_backend | tee test-results/full-validation/fips-buildinfo.txt
          go version -m bin/sovereign_backend | grep -E "GOFIPS140=latest|-tags=requirefips|CGO_ENABLED=1"

      - name: Prepare test environment
        run: npm run test:setup

      - name: Run fast validation profile
        run: npm run test:full:fast

      - name: Enforce trend SLOs
        env:
          VALIDATION_MAX_DURATION_REGRESSION_PCT: '40'
          VALIDATION_ENFORCE_CATEGORY_ZERO_FAIL: '1'
        run: npm run test:trends

      - name: Write diff summary
        run: npm run test:summary:diff

      - name: Upload full validation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: full-validation-pr-${{ github.run_id }}
          path: test-results/full-validation
          if-no-files-found: warn
          retention-days: 14
