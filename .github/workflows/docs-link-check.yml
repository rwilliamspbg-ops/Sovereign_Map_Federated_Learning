name: Docs Link Check

on:
  pull_request:
    paths:
      - "Documentation/**"
      - "documentation/**"
      - ".github/**/*.md"
      - "scripts/check_active_doc_links.py"
  push:
    branches: [main]
    paths:
      - "Documentation/**"
      - "documentation/**"
      - ".github/**/*.md"
      - "scripts/check_active_doc_links.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  active-doc-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.6.0
        with:
          python-version: "3.12"

      - name: Validate active documentation links
        run: python scripts/check_active_doc_links.py
