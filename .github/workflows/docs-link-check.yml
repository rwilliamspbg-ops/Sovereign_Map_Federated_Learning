name: Docs Link Check

on:
  pull_request:
    paths:
      - "Documentation/**"
      - "documentation/**"
      - ".github/**/*.md"
      - "scripts/check_active_doc_links.py"
  push:
    branches: [main]
    paths:
      - "Documentation/**"
      - "documentation/**"
      - ".github/**/*.md"
      - "scripts/check_active_doc_links.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  active-doc-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.6.0
        with:
          python-version: "3.12"

      - name: Validate active documentation links
        run: python scripts/check_active_doc_links.py
