name: HIL Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  tpm-emulated:
    name: TPM Emulator (swtpm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swtpm swtpm-tools tpm2-tools

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run TPM emulator HIL tests
        run: pytest -q tests/hil/test_tpm_emulated.py

  npu-fallback:
    name: NPU Fallback Logic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run NPU fallback tests
        run: pytest -q tests/hil/test_npu_device_selection.py