name: HIL Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  tpm-emulated:
    name: TPM Emulator (swtpm)
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swtpm swtpm-tools tpm2-tools

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run TPM emulator HIL tests
        run: pytest -q tests/hil/test_tpm_emulated.py

  npu-fallback:
    name: NPU Fallback Logic
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run NPU fallback tests
        run: pytest -q tests/hil/test_npu_device_selection.py