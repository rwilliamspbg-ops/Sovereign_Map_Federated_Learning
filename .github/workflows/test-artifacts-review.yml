name: Test Artifacts Review

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'tests/scripts/bash/run-1000-node-npu-test.sh'
      - 'docker-compose.full.yml'
      - 'tests/scripts/python/byzantine-stress-test-suite.py'
      - 'tests/scripts/python/generate-byzantine-test-suite-plots.py'
      - 'test-results/**'
  push:
    branches:
      - main
    paths:
      - 'tests/scripts/bash/run-1000-node-npu-test.sh'
      - 'docker-compose.full.yml'
      - 'tests/scripts/python/byzantine-stress-test-suite.py'
      - 'tests/scripts/python/generate-byzantine-test-suite-plots.py'
      - 'test-results/**'

jobs:
  stress-suite-plots:
    name: Stress Suite Plot Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.11'

      - name: Install plotting deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib seaborn

      - name: Run stress suite and generate plots
        run: |
          set -euo pipefail
          python tests/scripts/python/byzantine-stress-test-suite.py
          python tests/scripts/python/generate-byzantine-test-suite-plots.py

      - name: Upload stress suite plot artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: stress-suite-plots-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            test-results/byzantine-stress-test-suite

  upload-test-artifacts:
    name: Upload NPU and Stress Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Build artifact manifest
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Test Artifact Manifest"
            echo
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Included Paths"
            echo "- test-results/1000-node-npu"
            echo "- test-results/byzantine-stress-test-suite"
            echo
            echo "## File Counts"
            echo "- NPU files: $(find test-results/1000-node-npu -type f 2>/dev/null | wc -l | tr -d ' ')"
            echo "- Stress files: $(find test-results/byzantine-stress-test-suite -type f 2>/dev/null | wc -l | tr -d ' ')"
          } > test-artifact-manifest.md

      - name: Upload test artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: npu-and-stress-test-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            test-results/1000-node-npu
            test-results/byzantine-stress-test-suite
            test-artifact-manifest.md
