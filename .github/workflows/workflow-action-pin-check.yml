name: Workflow Action Pin Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce-pinned-actions:
    name: Enforce SHA-Pinned Actions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fail on non-SHA action refs
        run: |
          set -e
          # Any uses: owner/repo@ref must use a 40-character commit SHA.
          ACTION_REFS=$(grep -RInE '^[[:space:]]*uses:[[:space:]]*[^[:space:]]+@[^[:space:]#]+' .github/workflows/*.yml || true)

          if [ -z "$ACTION_REFS" ]; then
            echo "No action refs found to validate."
            exit 0
          fi

          VIOLATIONS=$(printf '%s\n' "$ACTION_REFS" | grep -Ev '@[0-9a-fA-F]{40}([[:space:]]|$|#)' || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "Found non-SHA action references:"
            printf '%s\n' "$VIOLATIONS"
            exit 1
          fi

          echo "All workflow action references are SHA-pinned."

      - name: Verify pinned SHAs resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import urllib.error
          import urllib.request
          from pathlib import Path

          token = os.environ.get('GITHUB_TOKEN', '')
          uses_re = re.compile(r"^\s*uses:\s*([^\s#]+)")
          sha_re = re.compile(r"^[0-9a-fA-F]{40}$")
          refs = set()

          for workflow in sorted(Path('.github/workflows').glob('*.yml')):
              for line in workflow.read_text(encoding='utf-8', errors='ignore').splitlines():
                  m = uses_re.match(line)
                  if not m:
                      continue
                  ref = m.group(1)
                  if ref.startswith('./') or ref.startswith('docker://'):
                      continue
                  if '@' not in ref:
                      continue
                  action, rev = ref.rsplit('@', 1)
                  if not sha_re.fullmatch(rev):
                      continue
                    parts = action.split('/')
                    if len(parts) < 2:
                      continue
                    repo = '/'.join(parts[:2])
                    refs.add((action, repo, rev, workflow.as_posix()))

          if not refs:
              print('No pinned action SHAs found to resolve.')
              sys.exit(0)

          headers = {
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'workflow-action-pin-check',
          }
          if token:
              headers['Authorization'] = f'Bearer {token}'

          failures = []
            for action, repo, rev, workflow in sorted(refs):
              url = f'https://api.github.com/repos/{repo}/commits/{rev}'
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      if resp.status != 200:
                    failures.append((workflow, action, rev, f'HTTP {resp.status}'))
              except urllib.error.HTTPError as exc:
                  failures.append((workflow, action, rev, f'HTTP {exc.code}'))
              except Exception as exc:
                  failures.append((workflow, action, rev, str(exc)))

          if failures:
              print('Found unresolved pinned action SHAs:')
              for workflow, action, rev, reason in failures:
                  print(f'- {workflow}: {action}@{rev} -> {reason}')
              sys.exit(1)

          print(f'All pinned action SHAs resolved successfully ({len(refs)} refs).')
          PY
