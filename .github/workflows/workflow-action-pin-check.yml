name: Workflow Action Pin Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce-pinned-actions:
    name: Enforce SHA-Pinned Actions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fail on non-SHA action refs
        run: |
          set -e
          # Any uses: owner/repo@ref must use a 40-character commit SHA.
          ACTION_REFS=$(grep -RInE '^[[:space:]]*uses:[[:space:]]*[^[:space:]]+@[^[:space:]#]+' .github/workflows/*.yml || true)

          if [ -z "$ACTION_REFS" ]; then
            echo "No action refs found to validate."
            exit 0
          fi

          VIOLATIONS=$(printf '%s\n' "$ACTION_REFS" | grep -Ev '@[0-9a-fA-F]{40}([[:space:]]|$|#)' || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "Found non-SHA action references:"
            printf '%s\n' "$VIOLATIONS"
            exit 1
          fi

          echo "All workflow action references are SHA-pinned."

      - name: Verify pinned SHAs resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/validate_pinned_action_shas.py
