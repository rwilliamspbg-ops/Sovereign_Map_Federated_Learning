name: SDK Publish

permissions:
  contents: write
  packages: write

on:
  push:
    branches: [ main ]
    paths: [ 'packages/**', 'apps/cli/**' ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build:libs
      - run: npm run test:ci

  publish:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check NPM token availability
        id: npm_token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip publish (missing NPM_TOKEN)
        if: steps.npm_token.outputs.present != 'true'
        run: echo "NPM_TOKEN is not configured; skipping SDK publish steps."

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        if: steps.npm_token.outputs.present == 'true'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.npm_token.outputs.present == 'true'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
        if: steps.npm_token.outputs.present == 'true'
      - run: npm run build:libs
        if: steps.npm_token.outputs.present == 'true'
      - run: npm run sdk:publish
        if: steps.npm_token.outputs.present == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
