name: SDK Publish

permissions:
  contents: write
  packages: write

on:
  push:
    branches: [ main ]
    paths: [ 'packages/**', 'apps/cli/**' ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/core/package-lock.json
            packages/privacy/package-lock.json
      - run: npm ci
      - run: npm run build:libs
      - run: npm run test:ci

  publish:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check NPM token availability
        id: npm_token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip publish (missing NPM_TOKEN)
        if: steps.npm_token.outputs.present != 'true'
        run: echo "NPM_TOKEN is not configured; skipping SDK publish steps."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.npm_token.outputs.present == 'true'
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: steps.npm_token.outputs.present == 'true'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/core/package-lock.json
            packages/privacy/package-lock.json
      - run: npm ci
        if: steps.npm_token.outputs.present == 'true'
      - run: npm run build:libs
        if: steps.npm_token.outputs.present == 'true'
      - run: npm run sdk:publish
        if: steps.npm_token.outputs.present == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
