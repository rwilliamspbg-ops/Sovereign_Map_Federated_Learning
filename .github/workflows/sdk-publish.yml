name: SDK Publish

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '22'
  NPM_VERSION: '10.9.2'

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ 'packages/**', 'apps/cli/**', 'CHANGELOG.md' ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/core/package-lock.json
            packages/consensus/package-lock.json
            packages/island/package-lock.json
            packages/privacy/package-lock.json
      - name: Pin npm version
        run: |
          npm install -g npm@${NPM_VERSION}
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
      - run: bash scripts/npm-ci-safe.sh
      - run: npm run build:libs
      - run: npm run test:ci

  publish:
    needs: test
    if: github.event_name == 'release' || (github.event_name == 'push' && contains(github.event.head_commit.message, 'chore(release)'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Detect SDK version
        id: version
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Extract version from commit message or use placeholder
          if [[ "$HEAD_COMMIT_MESSAGE" =~ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "sdk_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "sdk_version=0.2.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Check NPM token availability
        id: npm_token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip publish (missing NPM_TOKEN)
        if: steps.npm_token.outputs.present != 'true'
        run: echo "⚠️  NPM_TOKEN is not configured; skipping SDK publish steps."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.npm_token.outputs.present == 'true'
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: steps.npm_token.outputs.present == 'true'
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/core/package-lock.json
            packages/consensus/package-lock.json
            packages/island/package-lock.json
            packages/privacy/package-lock.json
      - name: Pin npm version
        if: steps.npm_token.outputs.present == 'true'
        run: |
          npm install -g npm@${NPM_VERSION}
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
      - run: bash scripts/npm-ci-safe.sh
        if: steps.npm_token.outputs.present == 'true'
      - run: npm run build:libs
        if: steps.npm_token.outputs.present == 'true'
      - name: Publish SDK packages to npm
        if: steps.npm_token.outputs.present == 'true'
        run: npm run sdk:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Software Bill of Materials (SBOM)
        if: steps.npm_token.outputs.present == 'true'
        run: npm run sdk:sbom
      - name: Generate Release Notes
        if: steps.npm_token.outputs.present == 'true'
        id: release_notes
        run: bash scripts/generate-release-notes.sh ${{ steps.version.outputs.sdk_version }} | tee /tmp/release-notes.md
      - name: Create GitHub Release with SBOM
        if: steps.npm_token.outputs.present == 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: v${{ steps.version.outputs.sdk_version }}
          name: v${{ steps.version.outputs.sdk_version }}
          body_path: /tmp/release-notes.md
          files: |
            .sbom/*.json
          draft: false
          prerelease: contains(steps.version.outputs.sdk_version, 'alpha') || contains(steps.version.outputs.sdk_version, 'beta')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

