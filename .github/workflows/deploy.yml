name: 🚀 Build & Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================================================
  # TEST & VALIDATION
  # ========================================================================
  
  test:
    name: Test & Validate
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
        continue-on-error: true
      
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Validate Docker Compose files
        run: |
          echo "Validating docker-compose files..."
          for file in docker-compose.full.yml; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              docker compose -f "$file" config > /dev/null 2>&1 && echo "✅ $file valid" || echo "⚠️  $file validation skipped (Docker not available in test env)"
            fi
          done
          echo "✅ Docker Compose validation complete"
      
      - name: Check documentation
        run: |
          REQUIRED_DOCS=(
            "README.md"
            "Documentation/Deployment/DEPLOYMENT.md"
            "Documentation/Architecture/ARCHITECTURE.md"
            "Documentation/Security/TPM_TRUST_GUIDE.md"
            "Documentation/Security/TPM_MONITORING_GUIDE.md"
          )

          missing=0
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ -f "$doc" ]; then
              echo "✅ $doc exists"
            else
              echo "❌ Missing required documentation: $doc"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Documentation checks failed"
            exit 1
          fi
  
  # ========================================================================
  # BUILD DOCKER IMAGES
  # ========================================================================
  
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      
      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true
  
  # ========================================================================
  # DEPLOY TO STAGING (Automatic)
  # ========================================================================
  
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate staging deploy inputs
        id: staging_inputs
        run: |
          RAW_HOST="${{ secrets.STAGING_HOST }}"
          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          DEPLOY_KEY="${{ secrets.DEPLOY_KEY }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

          STAGING_HOST="${RAW_HOST#http://}"
          STAGING_HOST="${STAGING_HOST#https://}"
          STAGING_HOST="${STAGING_HOST%%/*}"
          STAGING_HOST="${STAGING_HOST%%:*}"

          if [ -z "$STAGING_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "host=$STAGING_HOST" >> "$GITHUB_OUTPUT"
            echo "⚠️ Missing staging deploy inputs; staging deploy/health steps will be skipped"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "host=$STAGING_HOST" >> "$GITHUB_OUTPUT"

      - name: Validate staging secrets
        if: steps.staging_inputs.outputs.ready == 'true'
        env:
          STAGING_MONGO_PASSWORD: ${{ secrets.STAGING_MONGO_PASSWORD }}
          STAGING_REDIS_PASSWORD: ${{ secrets.STAGING_REDIS_PASSWORD }}
          STAGING_GRAFANA_ADMIN_PASSWORD: ${{ secrets.STAGING_GRAFANA_ADMIN_PASSWORD }}
          MONGO_PASSWORD_FALLBACK: ${{ secrets.MONGO_PASSWORD }}
          REDIS_PASSWORD_FALLBACK: ${{ secrets.REDIS_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD_FALLBACK: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          export MONGO_PASSWORD="${STAGING_MONGO_PASSWORD:-$MONGO_PASSWORD_FALLBACK}"
          export REDIS_PASSWORD="${STAGING_REDIS_PASSWORD:-$REDIS_PASSWORD_FALLBACK}"
          export GRAFANA_ADMIN_PASSWORD="${STAGING_GRAFANA_ADMIN_PASSWORD:-$GRAFANA_ADMIN_PASSWORD_FALLBACK}"
          bash ./validate-secrets.sh prod
      
      - name: Deploy to staging via SSH
        if: steps.staging_inputs.outputs.ready == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          STAGING_MONGO_PASSWORD: ${{ secrets.STAGING_MONGO_PASSWORD }}
          STAGING_REDIS_PASSWORD: ${{ secrets.STAGING_REDIS_PASSWORD }}
          STAGING_GRAFANA_ADMIN_PASSWORD: ${{ secrets.STAGING_GRAFANA_ADMIN_PASSWORD }}
          MONGO_PASSWORD_FALLBACK: ${{ secrets.MONGO_PASSWORD }}
          REDIS_PASSWORD_FALLBACK: ${{ secrets.REDIS_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD_FALLBACK: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ steps.staging_inputs.outputs.host }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: STAGING_MONGO_PASSWORD,STAGING_REDIS_PASSWORD,STAGING_GRAFANA_ADMIN_PASSWORD,MONGO_PASSWORD_FALLBACK,REDIS_PASSWORD_FALLBACK,GRAFANA_ADMIN_PASSWORD_FALLBACK
          script: |
            set -e
            echo "📦 Deploying to Staging..."
            cd ${{ secrets.DEPLOY_PATH }}/staging || mkdir -p ${{ secrets.DEPLOY_PATH }}/staging && cd ${{ secrets.DEPLOY_PATH }}/staging

            MONGO_PASSWORD="${STAGING_MONGO_PASSWORD:-$MONGO_PASSWORD_FALLBACK}"
            REDIS_PASSWORD="${STAGING_REDIS_PASSWORD:-$REDIS_PASSWORD_FALLBACK}"
            GRAFANA_ADMIN_PASSWORD="${STAGING_GRAFANA_ADMIN_PASSWORD:-$GRAFANA_ADMIN_PASSWORD_FALLBACK}"
            
            # Pull latest code
            git clone --depth 1 https://github.com/${{ github.repository }}.git . || git pull origin main
            
            # Pull latest images
            docker compose -f docker-compose.full.yml pull || true
            
            # Deploy with 50 nodes (staging)
            NUM_NODES=50 \
            MONGO_PASSWORD="$MONGO_PASSWORD" \
            REDIS_PASSWORD="$REDIS_PASSWORD" \
            GRAFANA_ADMIN_PASSWORD="$GRAFANA_ADMIN_PASSWORD" \
            docker compose -f docker-compose.full.yml up -d --scale node-agent=50
            
            # Wait for services
            sleep 30
            
            # Verify deployment
            docker compose -f docker-compose.full.yml ps
            
            echo "✅ Staging deployment complete"
        continue-on-error: true
      
      - name: Health check
        if: steps.staging_inputs.outputs.ready == 'true'
        run: |
          STAGING_HOST="${{ steps.staging_inputs.outputs.host }}"

          for i in {1..30}; do
            if curl -f "http://${STAGING_HOST}:8000/health"; then
              echo "✅ Staging health check passed"
              exit 0
            fi
            echo "⏳ Waiting for service... ($i/30)"
            sleep 5
          done
          echo "⚠️  Health check timeout (staging may still be initializing)"
          exit 0
        continue-on-error: true
  
  # ========================================================================
  # SMOKE TESTS (Post-Deployment)
  # ========================================================================
  
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Backend API health
        run: |
          RAW_HOST="${{ secrets.STAGING_HOST }}"
          STAGING_HOST="${RAW_HOST#http://}"
          STAGING_HOST="${STAGING_HOST#https://}"
          STAGING_HOST="${STAGING_HOST%%/*}"
          STAGING_HOST="${STAGING_HOST%%:*}"

          if [ -z "$STAGING_HOST" ]; then
            echo "⚠️  STAGING_HOST is empty after normalization; skipping backend health check"
            exit 0
          fi

          curl -f "http://${STAGING_HOST}:8000/health" || echo "⚠️  Backend not yet ready"
        continue-on-error: true
      
      - name: Verify system is operational
        run: |
          echo "✅ Staging deployment pipeline executed"
          echo "Next: Manual approval required for production deployment"
  
  # ========================================================================
  # DEPLOY TO PRODUCTION (Manual - Requires Approval)
  # ========================================================================
  
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate production deploy inputs
        id: prod_inputs
        run: |
          RAW_HOST="${{ secrets.PROD_HOST }}"
          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          DEPLOY_KEY="${{ secrets.DEPLOY_KEY }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

          PROD_HOST="${RAW_HOST#http://}"
          PROD_HOST="${PROD_HOST#https://}"
          PROD_HOST="${PROD_HOST%%/*}"
          PROD_HOST="${PROD_HOST%%:*}"

          if [ -z "$PROD_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "host=$PROD_HOST" >> "$GITHUB_OUTPUT"
            echo "⚠️ Missing production deploy inputs; production deploy steps will be skipped"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "host=$PROD_HOST" >> "$GITHUB_OUTPUT"

      - name: Validate production secrets
        if: steps.prod_inputs.outputs.ready == 'true'
        env:
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          bash ./validate-secrets.sh prod
      
      - name: Deploy to production via SSH
        if: steps.prod_inputs.outputs.ready == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ steps.prod_inputs.outputs.host }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: MONGO_PASSWORD,REDIS_PASSWORD,GRAFANA_ADMIN_PASSWORD
          script: |
            set -e
            echo "🚀 Deploying to Production..."
            cd ${{ secrets.DEPLOY_PATH }}/production || mkdir -p ${{ secrets.DEPLOY_PATH }}/production && cd ${{ secrets.DEPLOY_PATH }}/production
            
            # Pull latest code
            git clone --depth 1 https://github.com/${{ github.repository }}.git . || git pull origin main
            
            # Backup current state
            docker compose -f docker-compose.full.yml config > backup-$(date +%s).yml || true
            
            # Pull latest images
            docker compose -f docker-compose.full.yml pull
            
            # Deploy with 100 nodes (production)
            NUM_NODES=100 \
            MONGO_PASSWORD="$MONGO_PASSWORD" \
            REDIS_PASSWORD="$REDIS_PASSWORD" \
            GRAFANA_ADMIN_PASSWORD="$GRAFANA_ADMIN_PASSWORD" \
            docker compose -f docker-compose.full.yml up -d --scale node-agent=100
            
            # Wait for services to be healthy
            sleep 60
            
            # Verify deployment
            docker compose -f docker-compose.full.yml ps
            
            echo "✅ Production deployment complete"
      
      - name: Production health verification
        if: steps.prod_inputs.outputs.ready == 'true'
        run: |
          echo "🔍 Performing production health checks..."
          PROD_HOST="${{ steps.prod_inputs.outputs.host }}"

          for i in {1..60}; do
            if curl -f "http://${PROD_HOST}:8000/health"; then
              echo "✅ Production backend online"
              break
            fi
            echo "⏳ Waiting for service... ($i/60)"
            sleep 5
          done
      
      - name: Deployment summary
        if: steps.prod_inputs.outputs.ready == 'true'
        run: |
          PROD_HOST="${{ steps.prod_inputs.outputs.host }}"

          echo "=========================================="
          echo "✅ Production Deployment Successful"
          echo "=========================================="
          echo "Backend API: http://${PROD_HOST}:8000"
          echo "Grafana Dashboard: http://${PROD_HOST}:3000"
          echo "Prometheus Metrics: http://${PROD_HOST}:9090"
          echo "TPM Metrics: http://${PROD_HOST}:9091"
          echo "=========================================="

  # ========================================================================
  # PHASE 3D K8S DEPLOY (Optional)
  # ========================================================================

  deploy-phase3d-k8s:
    name: Deploy Phase 3D to K8s
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate Phase 3D deploy inputs
        id: phase3d_inputs
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ] || [ -z "${{ secrets.AWS_REGION }}" ] || [ -z "${{ secrets.EKS_CLUSTER_NAME }}" ] || [ -z "${{ secrets.PHASE3D_ECR_REPOSITORY }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Missing AWS/EKS/ECR secrets for Phase 3D deployment; skipping"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        if: steps.phase3d_inputs.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@930440c6817aa426f625c392392d41129b016a7a
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Phase 3D training service
        if: steps.phase3d_inputs.outputs.ready == 'true'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ECR_REPOSITORY: ${{ secrets.PHASE3D_ECR_REPOSITORY }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          IMAGE_TAG: ${{ github.sha }}
          ENABLE_GPU: ${{ secrets.PHASE3D_ENABLE_GPU || 'true' }}
        run: |
          chmod +x deploy/production/deploy-phase3d-production.sh
          ./deploy/production/deploy-phase3d-production.sh

  # ========================================================================
  # FRONTEND CDN PUBLISH (Optional)
  # ========================================================================

  publish-frontend-cdn:
    name: Publish Frontend CDN
    runs-on: ubuntu-latest
    needs:
      - deploy-production
      - deploy-phase3d-k8s
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate CDN deploy inputs
        id: cdn_inputs
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ] || [ -z "${{ secrets.AWS_REGION }}" ] || [ -z "${{ secrets.FRONTEND_S3_BUCKET }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Missing CDN secrets for frontend publish; skipping"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        if: steps.cdn_inputs.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@930440c6817aa426f625c392392d41129b016a7a
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build frontend
        if: steps.cdn_inputs.outputs.ready == 'true'
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Publish frontend assets
        if: steps.cdn_inputs.outputs.ready == 'true'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          FRONTEND_DIST_DIR: frontend/dist
          FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          chmod +x deploy/production/publish-frontend-cdn.sh
          ./deploy/production/publish-frontend-cdn.sh
  
  # ========================================================================
  # ROLLBACK PLAN (Manual)
  # ========================================================================
  
  rollback:
    name: Rollback Production (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    environment:
      name: production
    
    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "⏮️  Rolling back production..."
            cd ${{ secrets.DEPLOY_PATH }}/production
            
            # Get latest backup
            LATEST_BACKUP=$(ls -t backup-*.yml | head -1)
            
            if [ -z "$LATEST_BACKUP" ]; then
              echo "❌ No backup found"
              exit 1
            fi
            
            echo "📋 Restoring from: $LATEST_BACKUP"
            docker compose -f "$LATEST_BACKUP" down
            docker compose -f "$LATEST_BACKUP" up -d
            
            sleep 30
            docker compose ps
            
            echo "✅ Rollback complete"
