name: 🚀 Build & Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================================================
  # TEST & VALIDATION
  # ========================================================================
  
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short
        continue-on-error: true
      
      - name: Validate Docker Compose files
        run: |
          docker-compose -f docker-compose.full.yml config > /dev/null
          docker-compose -f docker-compose.monitoring.yml config > /dev/null
          docker-compose -f docker-compose.tpm-secure.yml config > /dev/null
          docker-compose -f docker-compose.monitoring.tpm.yml config > /dev/null
          echo "✅ All Docker Compose files valid"
      
      - name: Security check - dependencies
        run: |
          pip install safety
          safety check --json
        continue-on-error: true
      
      - name: Check documentation
        run: |
          [ -f README.md ] && echo "✅ README.md exists"
          [ -f DEPLOYMENT.md ] && echo "✅ DEPLOYMENT.md exists"
          [ -f ARCHITECTURE.md ] && echo "✅ ARCHITECTURE.md exists"
          [ -f TPM_TRUST_GUIDE.md ] && echo "✅ TPM_TRUST_GUIDE.md exists"
          [ -f TPM_MONITORING_GUIDE.md ] && echo "✅ TPM_MONITORING_GUIDE.md exists"
  
  # ========================================================================
  # BUILD DOCKER IMAGES
  # ========================================================================
  
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
  
  # ========================================================================
  # DEPLOY TO STAGING (Automatic)
  # ========================================================================
  
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: http://${{ secrets.STAGING_HOST }}:8000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "📦 Deploying to Staging..."
            cd ${{ secrets.DEPLOY_PATH }}/staging || mkdir -p ${{ secrets.DEPLOY_PATH }}/staging && cd ${{ secrets.DEPLOY_PATH }}/staging
            
            # Pull latest code
            git clone --depth 1 https://github.com/${{ github.repository }}.git . || git pull origin main
            
            # Pull latest images
            docker-compose -f docker-compose.full.yml pull || true
            
            # Deploy with 50 nodes (staging)
            NUM_NODES=50 docker-compose -f docker-compose.full.yml up -d --scale node-agent=50
            
            # Wait for services
            sleep 30
            
            # Verify deployment
            docker-compose -f docker-compose.full.yml ps
            
            echo "✅ Staging deployment complete"
      
      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -f http://${{ secrets.STAGING_HOST }}:8000/health; then
              echo "✅ Staging health check passed"
              exit 0
            fi
            echo "⏳ Waiting for service... ($i/30)"
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1
  
  # ========================================================================
  # SMOKE TESTS (Post-Deployment)
  # ========================================================================
  
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Backend API health
        run: |
          curl -f http://${{ secrets.STAGING_HOST }}:8000/health || exit 1
          echo "✅ Backend health check passed"
      
      - name: Prometheus metrics
        run: |
          metrics=$(curl -s http://${{ secrets.STAGING_HOST }}:9090/api/v1/query?query=up)
          if echo "$metrics" | grep -q "prometheus"; then
            echo "✅ Prometheus metrics available"
          else
            echo "⚠️  Prometheus metrics not yet available"
          fi
      
      - name: Convergence tracking
        run: |
          convergence=$(curl -s http://${{ secrets.STAGING_HOST }}:8000/convergence)
          if echo "$convergence" | grep -q "accuracies"; then
            echo "✅ Convergence tracking active"
          else
            echo "❌ Convergence tracking unavailable"
            exit 1
          fi
      
      - name: TPM metrics
        run: |
          metrics=$(curl -s http://${{ secrets.STAGING_HOST }}:9091/health)
          if echo "$metrics" | grep -q "healthy"; then
            echo "✅ TPM metrics exporter healthy"
          else
            echo "⚠️  TPM metrics not yet ready"
          fi
  
  # ========================================================================
  # DEPLOY TO PRODUCTION (Manual - Requires Approval)
  # ========================================================================
  
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://${{ secrets.PROD_HOST }}:8000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create deployment notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🚀 Production deployment in progress...'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
      
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop_on_error: true
          script: |
            set -e
            echo "🚀 Deploying to Production..."
            cd ${{ secrets.DEPLOY_PATH }}/production || mkdir -p ${{ secrets.DEPLOY_PATH }}/production && cd ${{ secrets.DEPLOY_PATH }}/production
            
            # Pull latest code
            git clone --depth 1 https://github.com/${{ github.repository }}.git . || git pull origin main
            
            # Backup current state
            docker-compose -f docker-compose.full.yml config > backup-$(date +%s).yml || true
            
            # Pull latest images
            docker-compose -f docker-compose.full.yml pull
            
            # Deploy with 100 nodes (production)
            NUM_NODES=100 docker-compose -f docker-compose.full.yml up -d --scale node-agent=100
            
            # Wait for services to be healthy
            sleep 60
            
            # Verify deployment
            docker-compose -f docker-compose.full.yml ps
            
            echo "✅ Production deployment complete"
      
      - name: Production health verification
        run: |
          echo "🔍 Performing production health checks..."
          for i in {1..60}; do
            if curl -f http://${{ secrets.PROD_HOST }}:8000/health; then
              echo "✅ Production backend online"
              break
            fi
            echo "⏳ Waiting for service... ($i/60)"
            sleep 5
          done
      
      - name: Notify Slack - Success
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ Production deployment successful! Environment: ${{ secrets.PROD_HOST }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: success()
      
      - name: Notify Slack - Failure
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '❌ Production deployment failed! Check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: failure()

  # ========================================================================
  # ROLLBACK PLAN (Manual)
  # ========================================================================
  
  rollback:
    name: Rollback Production (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    
    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "⏮️  Rolling back production..."
            cd ${{ secrets.DEPLOY_PATH }}/production
            
            # Get latest backup
            LATEST_BACKUP=$(ls -t backup-*.yml | head -1)
            
            if [ -z "$LATEST_BACKUP" ]; then
              echo "❌ No backup found"
              exit 1
            fi
            
            echo "📋 Restoring from: $LATEST_BACKUP"
            docker-compose -f "$LATEST_BACKUP" down
            docker-compose -f "$LATEST_BACKUP" up -d
            
            sleep 30
            docker-compose ps
            
            echo "✅ Rollback complete"

