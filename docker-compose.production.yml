services:
  # Backend: Federated Learning Aggregator + Flask Metrics API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.optimized
    image: sovereignmap/backend:latest
    ports:
      - "${BACKEND_API_HOST_PORT:-8000}:8000"  # Flask Metrics API
      - "${BACKEND_GRPC_HOST_PORT:-8080}:8080"  # Flower gRPC (if enabled)
    environment:
      - FLASK_ENV=production
      - NODE_ID=0
      - NUM_NODES=${NUM_NODES:-100}
      - NUM_ROUNDS=${NUM_ROUNDS:-0}
      - FLASK_PORT=8000
      - PYTHONUNBUFFERED=1
      - DATABASE_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-CHANGE_ME_MONGO}@mongo:27017/sovereignmap?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS}@redis:6379/0
      - TPM_ENABLED=${TPM_ENABLED:-true}
      - CERT_DIR=/etc/sovereign/certs
      - TOKENOMICS_METRICS_ENDPOINT=http://tokenomics-metrics:9105/event/tokenomics
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      tpm-ca:
        condition: service_completed_successfully
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sovereignmap
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - backend_data:/app/data
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py:ro
      - ./secure_communication.py:/app/secure_communication.py:ro
      - tpm-certs:/etc/sovereign/certs
      - sovereign-logs:/var/log/sovereign
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Frontend: React/Nginx Web UI
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.optimized
    image: sovereignmap/frontend:latest
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # MongoDB: Primary Data Store
  mongo:
    image: mongo:7.0
    ports:
      - "127.0.0.1:${MONGO_HOST_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-CHANGE_ME_MONGO}
      MONGO_INITDB_DATABASE: sovereignmap
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - sovereignmap
    volumes:
      - mongo_data:/data/db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  # Redis: Caching & Session Store
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-CHANGE_ME_REDIS}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Federated Learning Node Agent (scales horizontally)
  tpm-ca:
    image: python:3.11-slim
    container_name: sovereign-tpm-ca
    environment:
      - CERT_DIR=/etc/sovereign/certs
      - NODE_ID=0
      - NUM_NODES=100
    volumes:
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py:ro
      - ./tpm-bootstrap.sh:/app/tpm-bootstrap.sh
      - tpm-certs:/etc/sovereign/certs
      - sovereign-logs:/var/log/sovereign
    working_dir: /app
    command: >
      bash -c "pip install --quiet cryptography && chmod +x /app/tpm-bootstrap.sh && /app/tpm-bootstrap.sh"
    networks:
      - sovereignmap
    restart: "no"

  node-agent-1:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    image: sovereignmap/node-agent:latest
    environment:
      - FL_SERVER_MODE=false
      - NODE_AGENT_MODE=true
      - BACKEND_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
      - NODE_PEER_ID=node_agent_1
      - NODE_ID=1
      - TPM_ENABLED=true
      - CERT_DIR=/etc/sovereign/certs
      - NUM_NODES=100
      - AGGREGATOR_HOST=backend
      - AGGREGATOR_PORT=8080
    command: ["python", "-u", "src/client.py", "--node-id", "1", "--aggregator", "backend:8080"]
    depends_on:
      backend:
        condition: service_healthy
      mongo:
        condition: service_healthy
      tpm-ca:
        condition: service_completed_successfully
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/comm && grep -qi python /proc/1/comm"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - sovereignmap
    volumes:
      - ./src:/app/src:ro
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py:ro
      - ./secure_communication.py:/app/secure_communication.py:ro
      - tpm-certs:/etc/sovereign/certs:ro
      - sovereign-logs:/var/log/sovereign
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  node-agent-2:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    image: sovereignmap/node-agent:latest
    environment:
      - FL_SERVER_MODE=false
      - NODE_AGENT_MODE=true
      - BACKEND_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
      - NODE_PEER_ID=node_agent_2
      - NODE_ID=2
      - TPM_ENABLED=true
      - CERT_DIR=/etc/sovereign/certs
      - NUM_NODES=100
      - AGGREGATOR_HOST=backend
      - AGGREGATOR_PORT=8080
    command: ["python", "-u", "src/client.py", "--node-id", "2", "--aggregator", "backend:8080"]
    depends_on:
      backend:
        condition: service_healthy
      mongo:
        condition: service_healthy
      tpm-ca:
        condition: service_completed_successfully
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/comm && grep -qi python /proc/1/comm"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - sovereignmap
    volumes:
      - ./src:/app/src:ro
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py:ro
      - ./secure_communication.py:/app/secure_communication.py:ro
      - tpm-certs:/etc/sovereign/certs:ro
      - sovereign-logs:/var/log/sovereign
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  node-agent-3:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    image: sovereignmap/node-agent:latest
    environment:
      - FL_SERVER_MODE=false
      - NODE_AGENT_MODE=true
      - BACKEND_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
      - NODE_PEER_ID=node_agent_3
      - NODE_ID=3
      - TPM_ENABLED=true
      - CERT_DIR=/etc/sovereign/certs
      - NUM_NODES=100
      - AGGREGATOR_HOST=backend
      - AGGREGATOR_PORT=8080
    command: ["python", "-u", "src/client.py", "--node-id", "3", "--aggregator", "backend:8080"]
    depends_on:
      backend:
        condition: service_healthy
      mongo:
        condition: service_healthy
      tpm-ca:
        condition: service_completed_successfully
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/comm && grep -qi python /proc/1/comm"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - sovereignmap
    volumes:
      - ./src:/app/src:ro
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py:ro
      - ./secure_communication.py:/app/secure_communication.py:ro
      - tpm-certs:/etc/sovereign/certs:ro
      - sovereign-logs:/var/log/sovereign
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Prometheus: Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./tpm_alerts.yml:/etc/prometheus/tpm_alerts.yml:ro
      - ./dashboard_compat_rules.yml:/etc/prometheus/dashboard_compat_rules.yml:ro
      - ./fl_slo_alerts.yml:/etc/prometheus/fl_slo_alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Tokenomics Metrics: Explicit token/wallet telemetry for Grafana dashboards
  tokenomics-metrics:
    image: python:3.11-slim
    volumes:
      - ./tokenomics_metrics_exporter.py:/app/tokenomics_metrics_exporter.py:ro
      - ./test-data/tokenomics-telemetry.json:/app/data/tokenomics-telemetry.json
    working_dir: /app
    command: ["sh", "-c", "python -m pip install --no-cache-dir prometheus-client flask && python tokenomics_metrics_exporter.py"]
    environment:
      - TOKENOMICS_SOURCE_FILE=/app/data/tokenomics-telemetry.json
      - TOKENOMICS_METRICS_PORT=9105
    expose:
      - "9105"
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9105/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Grafana: Visualization & Dashboards
  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-CHANGE_ME_GRAFANA}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - tokenomics-metrics
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Alertmanager: Alert Management
  alertmanager:
    image: prom/alertmanager:v0.26.0
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # TPM Metrics Exporter: TPM Certificate & Attestation Event Metrics
  tpm-metrics:
    image: python:3.11-slim
    container_name: sovereign-tpm-metrics
    volumes:
      - ./tpm_metrics_exporter.py:/app/tpm_metrics_exporter.py:ro
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py:ro
      - tpm-certs:/etc/sovereign/certs
    working_dir: /app
    command: ["sh", "-c", "python -m pip install --no-cache-dir prometheus-client flask cryptography && python tpm_metrics_exporter.py"]
    ports:
      - "${TPM_METRICS_HOST_PORT:-9091}:9091"
    networks:
      - sovereignmap
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9091/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  sovereignmap:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  backend_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  tpm-certs:
    driver: local
  sovereign-logs:
    driver: local
