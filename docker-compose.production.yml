version: '3.9'

services:
  # Backend: Federated Learning Aggregator + Flask Metrics API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.optimized
    image: sovereignmap/backend:latest
    container_name: sovereignmap-backend
    ports:
      - "8000:8000"  # Flask Metrics API
      - "8080:8080"  # Flower gRPC (if enabled)
    environment:
      - FLASK_ENV=production
      - NODE_ID=0
      - NUM_NODES=${NUM_NODES:-10}
      - NUM_ROUNDS=${NUM_ROUNDS:-100}
      - FLASK_PORT=8000
      - PYTHONUNBUFFERED=1
      - DATABASE_URI=mongodb://mongo:27017/sovereignmap
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sovereignmap
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - backend_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Frontend: React/Nginx Web UI
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.optimized
    image: sovereignmap/frontend:latest
    container_name: sovereignmap-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # MongoDB: Primary Data Store
  mongo:
    image: mongo:7.0-alpine
    container_name: sovereignmap-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-sovereignmap}
      MONGO_INITDB_DATABASE: sovereignmap
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sovereignmap
    volumes:
      - mongo_data:/data/db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  # Redis: Caching & Session Store
  redis:
    image: redis:7-alpine
    container_name: sovereignmap-redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sovereignmap}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Federated Learning Node Agent (scales horizontally)
  node-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereignmap/node-agent:latest
    environment:
      - FL_SERVER_MODE=false
      - NODE_AGENT_MODE=true
      - BACKEND_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
      - NODE_PEER_ID=${NODE_ID:-node_agent}
    depends_on:
      backend:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sovereignmap
    volumes:
      - ./src:/app/src:ro
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Prometheus: Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.0-alpine
    container_name: sovereignmap-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Grafana: Visualization & Dashboards
  grafana:
    image: grafana/grafana:10.2-alpine
    container_name: sovereignmap-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-sovereignmap}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Alertmanager: Alert Management
  alertmanager:
    image: prom/alertmanager:v0.26.0-alpine
    container_name: sovereignmap-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sovereignmap
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  sovereignmap:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  backend_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
