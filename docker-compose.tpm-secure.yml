# Secure Node-to-Node Communication with TPM Certificates
# Usage: docker compose -f docker-compose.tpm-secure.yml up -d

services:
  # Backend with secure communication
  backend-secure:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sovereign-backend-secure
    environment:
      - FLASK_ENV=production
      - NODE_ID=0
      - NUM_NODES=10
      - CERT_DIR=/etc/sovereign/certs
      - PROMETHEUS_PORT=8000
    volumes:
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py
      - ./secure_communication.py:/app/secure_communication.py
      - ./tpm-bootstrap.sh:/app/tpm-bootstrap.sh
      - tpm-certs:/etc/sovereign/certs
      - sovereign-logs:/var/log/sovereign
    ports:
      - "8000:8000"
      - "5000:5000"
    networks:
      - sovereign-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    entrypoint: ["/app/tpm-bootstrap.sh", "python", "sovereignmap_production_backend_v2.py"]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Node agents with secure communication (scaled)
  node-agent-secure:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    environment:
      - NODE_ID=${NODE_ID:-1}
      - BACKEND_URL=http://backend-secure:8000
      - CERT_DIR=/etc/sovereign/certs
      - NUM_NODES=10
    volumes:
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py
      - ./secure_communication.py:/app/secure_communication.py
      - ./tpm-bootstrap.sh:/app/tpm-bootstrap.sh
      - tpm-certs:/etc/sovereign/certs
      - sovereign-logs:/var/log/sovereign
    networks:
      - sovereign-network
    depends_on:
      - backend-secure
    entrypoint: ["/app/tpm-bootstrap.sh", "python", "src/client.py", "--aggregator", "backend-secure:5000"]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certificate Authority service (runs once on node-0)
  tpm-ca-service:
    image: python:3.11-slim
    container_name: sovereign-tpm-ca
    volumes:
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py
      - tpm-certs:/etc/sovereign/certs
      - sovereign-logs:/var/log/sovereign
    working_dir: /app
    command:
      - python
      - -c
      - |
        from tpm_cert_manager import TPMCertificateManager
        import time

        TPMCertificateManager('/etc/sovereign/certs')
        print('CA Service Ready - Certificates available at /etc/sovereign/certs')

        while True:
            time.sleep(3600)
    networks:
      - sovereign-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Trust verification dashboard (optional - exposes trust API)
  trust-dashboard:
    image: python:3.11-slim
    container_name: sovereign-trust-dashboard
    volumes:
      - ./secure_communication.py:/app/secure_communication.py
      - ./tpm_cert_manager.py:/app/tpm_cert_manager.py
      - tpm-certs:/etc/sovereign/certs
    working_dir: /app
    command: python secure_communication.py
    ports:
      - "5001:5000"
    networks:
      - sovereign-network
    depends_on:
      - tpm-ca-service
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tpm-certs:
    driver: local
  sovereign-logs:
    driver: local

networks:
  sovereign-network:
    external: true
    driver: bridge
