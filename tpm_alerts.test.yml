rule_files:
  - tpm_alerts.yml

evaluation_interval: 1m

tests:
  - name: invalid-trust-chain-fires
    interval: 1m
    input_series:
      - series: 'tpm_trust_chain_valid{node_id="node-9"}'
        values: '0+0x20'
    alert_rule_test:
      - eval_time: 6m
        alertname: InvalidTrustChain
        exp_alerts:
          - exp_labels:
              severity: critical
              component: tpm
              node_id: node-9
            exp_annotations:
              summary: "Invalid trust chain (Node node-9)"
              description: "Node node-9 has an invalid trust chain"

  - name: ca-invalid-fires
    interval: 1m
    input_series:
      - series: 'tpm_ca_certificate_valid'
        values: '0+0x20'
    alert_rule_test:
      - eval_time: 2m
        alertname: CAInvalid
        exp_alerts:
          - exp_labels:
              severity: critical
              component: tpm
            exp_annotations:
              summary: "Certificate Authority is invalid"
              description: "The root CA certificate is invalid or missing"

  - name: high-signature-failure-rate-fires
    interval: 1m
    input_series:
      - series: 'tpm_signature_verification_failures_total{from_node_id="node-4"}'
        values: '0+10x30'
    alert_rule_test:
      - eval_time: 4m
        alertname: HighSignatureFailureRate
        exp_alerts:
          - exp_labels:
              severity: critical
              component: tpm
              from_node_id: node-4
            exp_annotations:
              summary: "High signature failure rate from node node-4"
              description: "More than 10% of signatures from node node-4 are failing verification"

  - name: certificate-revoked-fires
    interval: 1m
    input_series:
      - series: 'tpm_node_certificate_revoked{node_id="node-6"}'
        values: '1+0x20'
    alert_rule_test:
      - eval_time: 2m
        alertname: CertificateRevoked
        exp_alerts:
          - exp_labels:
              severity: critical
              component: tpm
              node_id: node-6
            exp_annotations:
              summary: "Certificate revoked (Node node-6)"
              description: "Node node-6 certificate has been revoked"

  - name: invalid-trust-chain-not-firing-when-valid
    interval: 1m
    input_series:
      - series: 'tpm_trust_chain_valid{node_id="node-10"}'
        values: '1+0x20'
    alert_rule_test:
      - eval_time: 8m
        alertname: InvalidTrustChain
        exp_alerts: []

  - name: tpm-cache-miss-surge-fires
    interval: 1m
    input_series:
      - series: 'mohawk_tpm_cache_events_total{cache="quote",result="miss"}'
        values: '0+40x40'
      - series: 'mohawk_tpm_cache_events_total{cache="quote",result="hit"}'
        values: '0+5x40'
      - series: 'mohawk_tpm_cache_events_total{cache="attestation",result="miss"}'
        values: '0+30x40'
      - series: 'mohawk_tpm_cache_events_total{cache="attestation",result="hit"}'
        values: '0+10x40'
    alert_rule_test:
      - eval_time: 16m
        alertname: TPMCacheMissSurge
        exp_alerts:
          - exp_labels:
              severity: warning
              component: tpm
            exp_annotations:
              summary: "TPM cache miss surge detected"
              description: "TPM cache miss ratio exceeded 30% for 10 minutes"

  - name: tpm-lock-wait-p95-regression-fires
    interval: 1m
    input_series:
      - series: 'mohawk_tpm_lock_wait_seconds_bucket{target="attestation_cache",mode="write",le="0.0001"}'
        values: '0+5x40'
      - series: 'mohawk_tpm_lock_wait_seconds_bucket{target="attestation_cache",mode="write",le="0.0002"}'
        values: '0+10x40'
      - series: 'mohawk_tpm_lock_wait_seconds_bucket{target="attestation_cache",mode="write",le="0.0005"}'
        values: '0+20x40'
      - series: 'mohawk_tpm_lock_wait_seconds_bucket{target="attestation_cache",mode="write",le="+Inf"}'
        values: '0+30x40'
    alert_rule_test:
      - eval_time: 16m
        alertname: TPMLockWaitP95Regression
        exp_alerts:
          - exp_labels:
              severity: warning
              component: tpm
              target: attestation_cache
              mode: write
            exp_annotations:
              summary: "TPM lock wait p95 regression"
              description: "TPM lock wait p95 exceeded 200us for target=attestation_cache mode=write"

  - name: tpm-nonce-replay-rejection-spike-fires
    interval: 1m
    input_series:
      - series: 'mohawk_tpm_nonce_replay_rejections_total'
        values: '0+20x40'
    alert_rule_test:
      - eval_time: 8m
        alertname: TPMNonceReplayRejectionSpike
        exp_alerts:
          - exp_labels:
              severity: warning
              component: tpm
            exp_annotations:
              summary: "TPM nonce replay rejection spike"
              description: "Replay rejections exceeded 0.1/s over 5 minutes"
