groups:
  - name: fl_slo_alerts
    interval: 15s
    rules:
      - alert: FLRoundStalled
        expr: increase(sovereignmap_fl_rounds_total[10m]) < 1
        for: 10m
        labels:
          severity: critical
          service: federated-learning
        annotations:
          summary: "FL rounds are stalled"
          description: "No federated learning round has completed in the last 10 minutes."

      - alert: FLAccuracyDegraded
        expr: sovereignmap_fl_accuracy < 80
        for: 5m
        labels:
          severity: warning
          service: federated-learning
        annotations:
          summary: "FL accuracy below SLO"
          description: "Model accuracy is below 80% for more than 5 minutes."

      - alert: FLClientParticipationLow
        expr: sovereignmap_active_nodes < 5
        for: 5m
        labels:
          severity: warning
          service: federated-learning
        annotations:
          summary: "FL client participation low"
          description: "Active FL clients are below minimum participation threshold (5)."

      - alert: FLRoundDurationHighP95
        expr: histogram_quantile(0.95, rate(sovereignmap_fl_round_duration_seconds_bucket[5m])) > 30
        for: 10m
        labels:
          severity: warning
          service: federated-learning
        annotations:
          summary: "FL p95 round duration high"
          description: "p95 FL round duration is above 30s for 10 minutes."

      - alert: BridgeCollateralRatioLow
        expr: sovereignmap_bridge_collateral_ratio_percent < 110
        for: 10m
        labels:
          severity: warning
          service: tokenomics
        annotations:
          summary: "Bridge collateral ratio below policy"
          description: "Bridge collateral ratio dropped below 110%."

      - alert: ConsensusStatusEndpointDown
        expr: sovereign_consensus_status_up == 0
        for: 2m
        labels:
          severity: critical
          service: consensus
        annotations:
          summary: "Consensus status endpoint is unavailable"
          description: "Metrics exporter cannot reach /api/v1/consensus/status for more than 2 minutes."

      - alert: ConsensusCapacityDrift
        expr: (sovereign_consensus_status_up == 1) and (sovereign_consensus_active_nodes < (sovereign_consensus_quorum_size + 1))
        for: 5m
        labels:
          severity: warning
          service: consensus
        annotations:
          summary: "Consensus active-node capacity is close to quorum floor"
          description: "Active node count has drifted below quorum+1 and resilience margin is low."

      - alert: ConsensusOpenRoundsBacklog
        expr: (sovereign_consensus_status_up == 1) and (sovereign_consensus_open_rounds > 3)
        for: 10m
        labels:
          severity: warning
          service: consensus
        annotations:
          summary: "Consensus open-round backlog is elevated"
          description: "Open consensus rounds exceed 3 for 10 minutes, indicating commit pressure or stalls."

      - alert: AsyncStalenessHigh
        expr: sovereign_aggregation_staleness_avg_seconds > 1.5
        for: 10m
        labels:
          severity: warning
          service: consensus
        annotations:
          summary: "Async staleness average is above SLO"
          description: "Average async staleness exceeded 1.5 seconds for 10 minutes."

      - alert: ChurnBurstDetected
        expr: (clamp_min(delta(sovereign_aggregation_churn_joins_total[5m]), 0) + clamp_min(delta(sovereign_aggregation_churn_leaves_total[5m]), 0)) > 20
        for: 5m
        labels:
          severity: warning
          service: consensus
        annotations:
          summary: "Node churn burst detected"
          description: "Join+leave churn exceeded 20 events over 5 minutes."

      - alert: StaleDropBurstDetected
        expr: clamp_min(delta(sovereign_aggregation_stale_drops_total[10m]), 0) > 25
        for: 10m
        labels:
          severity: warning
          service: consensus
        annotations:
          summary: "Stale model drops are increasing rapidly"
          description: "Stale model drops increased by more than 25 over 10 minutes."
