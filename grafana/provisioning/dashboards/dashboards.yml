apiVersion: 1

providers:
  - name: 'Sovereign Dashboards'
    orgId: 1
    folder: 'Sovereign'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards
  
  - name: 'Genesis Launch'
    orgId: 1
    folder: 'Genesis'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 5
    options:
      path: /etc/grafana/provisioning/dashboards
