apiVersion: 1

providers:
  - name: 'Sovereign Dashboards'
    orgId: 1
    folder: 'Sovereign'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards

  - name: 'Sovereign Provisioned Dashboards'
    orgId: 1
    folder: 'Sovereign'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    options:
      path: /etc/grafana/provisioning/dashboards
